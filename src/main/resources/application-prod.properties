# ══════════════════════════════════════════════════════
# PROD PROFILE  — MySQL, Redis, real RabbitMQ, real SMTP
# Secrets are injected via environment variables (never hardcode in source)
# ══════════════════════════════════════════════════════

# ── Database (MySQL) ──────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/quantitymeasurementdb?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:qmuser}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── Redis ──────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms

# ── RabbitMQ ──────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.ssl.enabled=true

# ── Email (production SMTP) ────────────────────────────────────────────────────
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── JWT — override secret with strong key in prod ─────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-seconds=43200

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.app.quantitymeasurementapp=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
