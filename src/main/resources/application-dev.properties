# ══════════════════════════════════════════════════════
# DEV PROFILE  — H2 in-memory, no external services needed
# ══════════════════════════════════════════════════════

# ── Database (H2 in-memory) ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── Redis — dev uses in-memory ConcurrentMapCache (see RedisConfig @Profile dev)
# No Redis server needed in dev. The RedisCacheManager bean is NOT created.
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Connection timeout — if Redis is not running in dev, ignore (CacheManager is in-memory)
spring.cache.type=none

# ── RabbitMQ — connect to local RabbitMQ (docker: docker run -p 5672:5672 -p 15672:15672 rabbitmq:management)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
# Disable RabbitMQ listener if broker not available — set to false to suppress connection errors
spring.rabbitmq.listener.simple.auto-startup=true

# ── Email (MailHog: docker run -p 1025:1025 -p 8025:8025 mailhog/mailhog)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.from=noreply@quantitymeasurementapp.com

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.app.quantitymeasurementapp=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.amqp=INFO
