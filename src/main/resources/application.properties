spring.application.name=quantity-measurement-app

# ── Active profile (override on command-line: -Dspring.profiles.active=prod) ──
spring.profiles.active=dev

# ── OpenAPI / Swagger UI ───────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Actuator ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=always

# ── JWT ────────────────────────────────────────────────────────────────────────
# IMPORTANT: In production override this with a 256-bit secret from environment variable
# e.g. export APP_JWT_SECRET=<your-256-bit-key>
app.jwt.secret=ThisIsA256BitSecretKeyForQuantityMeasurementAppDev2025!
app.jwt.expiration-seconds=86400
