spring.application.name=quantity-measurement-app
# ── Active profile ────────────────────────────────────────────────────────────
spring.profiles.active=prod

# ── H2 in-memory database ─────────────────────────────────────────────────────
#spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=create-drop
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# ── H2 Console ────────────────────────────────────────────────────────────────
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────────────────────
# Generate your own secret: openssl rand -base64 64
#app.jwt.secret=ENTER_YOUR_JWT_SECRET
#app.jwt.expiration-ms=86400000
# ── Google OAuth2 ─────────────────────────────────────────────────────────────
# Get these from https://console.cloud.google.com → APIs & Services → Credentials
#spring.security.oauth2.client.registration.google.client-id=ENTER_YOUR_CLIENT_ID
#spring.security.oauth2.client.registration.google.client-secret=ENTER_YOUR_CLIENT_SECRET
#spring.security.oauth2.client.registration.google.scope=openid,email,profile
#spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# ── OpenAPI / Swagger ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.app.quantitymeasurementapp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
