# ── Test profile: H2, disable RabbitMQ/Redis auto-config ─────────────────────
spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT for tests
app.jwt.secret=TestSecretKey256BitForJwtValidationInTestsOnlyNotForProduction!
app.jwt.expiration-seconds=3600

# Disable RabbitMQ and mail in tests (mocked in test context)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

spring.cache.type=simple
logging.level.com.app.quantitymeasurementapp=WARN
